<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login -  JOVI V70</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <main class="login-container">

        <section class="login-box">

            <h1> JOVI V70</h1>

            <p>Faça login para entrar</p>

            <input
                type="text"
                id="user"
                placeholder="Usuário"
            >

            <input
                type="password"
                id="password"
                placeholder="Senha"
            >

            <button id="loginBtn">
                Entrar
            </button>

        </section>

    </main>

    <script src="js/login.js"></script>
</body>

</html>
